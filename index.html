<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>МКБиК Анонсы</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f5f5f5; font-family: sans-serif; }
    iframe { width: 100%; height: 100%; border: none; }
    #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 16px; color: #666; }
  </style>
</head>
<body>
  <div id="loading">Загрузка приложения МКБиК...</div>
  
  <script>
    const gistId = "fa03cc947771447859ac0cfb226f6305";
    const iframe = document.createElement("iframe");
    iframe.src = `https://dartpad.dev/embed-inline.html?id=${gistId}&theme=light`;
    
    iframe.onload = function() {
        document.getElementById("loading").style.display = "none";
    };
    
    document.body.appendChild(iframe);
  </script>
</body>
</html>
